apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamino-api
  labels:
    app.kubernetes.io/name: kamino-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: kamino
spec:
  replicas: 1
  revisionHistoryLimit: 3
  progressDeadlineSeconds: 900
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kamino-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kamino-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: kamino
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/maxwellcaron/kamino-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 10001
          envFrom:
            - configMapRef:
                name: kamino-config
            - secretRef:
                name: kamino-secrets
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
