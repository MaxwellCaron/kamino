services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      GIN_MODE: release
      PORT: :8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
