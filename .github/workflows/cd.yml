name: Build and publish

on:
  push:
    branches: [main, development]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write

  build:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            production_image: ghcr.io/maxwellcaron/kamino-api
            development_image: ghcr.io/maxwellcaron/kamino-dev-api
          - target: web
            production_image: ghcr.io/maxwellcaron/kamino-web
            development_image: ghcr.io/maxwellcaron/kamino-dev-web
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.ref_name == 'development' && matrix.development_image || matrix.production_image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,ref=${{ github.ref_name }}-${{ matrix.target }}
          cache-to: type=gha,ref=${{ github.ref_name }}-${{ matrix.target }},mode=max
