name: CI

on:
  pull_request:
    branches: [main, development]
  workflow_call:
  workflow_dispatch:

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod

      - name: gofmt
        working-directory: apps/api
        run: test -z "$(gofmt -l .)"

      - name: build
        working-directory: apps/api
        run: go build ./cmd/api

      - name: test
        working-directory: apps/api
        run: go test -race ./...

      - name: sqlc-drift-check
        working-directory: apps/api
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
          sqlc generate
          git diff --exit-code -- database/

      - name: govulncheck
        working-directory: apps/api
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: typecheck (secondary compiler, non-blocking)
        run: bun run typecheck:stable
        continue-on-error: true

      - name: lint
        run: bun run lint

      - name: test
        run: bun --filter web test

      - name: react-doctor
        uses: millionco/react-doctor@v2
        with:
          directory: apps/web
          scope: changed
          blocking: warning
