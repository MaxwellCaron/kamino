version: "2"
sql:
  - engine: "postgresql"
    queries: "database/queries"
    schema: "database/schema"
    gen:
      go:
        package: "database"
        out: "database"
        output_models_file_name: "types.go"
        sql_package: "pgx/v5"
        emit_json_tags: true
        omit_unused_structs: true
        emit_exact_table_names: true
        emit_pointers_for_null_types: true
