version: "2"
sql:
  - engine: "postgresql"
    queries: "database/queries"
    schema: "database/schema"
    gen:
      go:
        package: "database"
        out: "database"
        output_models_file_name: "types.go"
        sql_package: "pgx/v5"
        emit_json_tags: true
        omit_unused_structs: true
        emit_exact_table_names: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type:
              type: "float64"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              type: "float64"
              pointer: true
